<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Gameboy</title>
    <style>
        body {
            background-color: #111;
            color: #fff;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            color: #44ff88;
            text-shadow: 0 0 15px rgba(68, 255, 136, 0.4);
            letter-spacing: 2px;
        }
        p {
            color: #aaa;
            font-size: 1.1rem;
            max-width: 500px;
            margin-bottom: 50px;
            line-height: 1.6;
        }
        .play-btn {
            background: #222;
            color: #44ff88;
            border: 2px solid #44ff88;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            font-family: monospace;
            text-decoration: none;
            border-radius: 5px;
            transition: all 0.2s ease-in-out;
            cursor: pointer;
            text-transform: uppercase;
        }
        .play-btn:hover {
            background: #44ff88;
            color: #111;
            box-shadow: 0 0 20px #44ff88;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <h1>AI GAMEBOY</h1>
    <p>A modular platformer powered by real-time emotion and stress detection. Your webcam drives the gameplay environment.</p>
    
    <a href="game.html" class="play-btn">Play Now</a>

</body>
</html>
