<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Gameboy Stress Engine - Smooth Easing</title>
    <style>
        body { margin: 0; background: #111; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; color: white; font-family: monospace; }
        
        canvas { 
            border: 10px solid #333; 
            border-radius: 5px;
            width: 640px; 
            height: 576px; 
            box-shadow: 0px 10px 30px rgba(0,0,0,0.8);
        }

        #debugUI {
            width: 640px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 16px;
        }
        
        .raw-data { color: #ff5555; }
        .visual-data { color: #55ff55; }
    </style>
</head>
<body>

<div id="debugUI">
    <span class="raw-data" id="rawLabel">Raw Sensor: 0%</span>
    <span class="visual-data" id="visualLabel">Screen Lerp: 0%</span>
</div>

<canvas id="gameCanvas" width="640" height="576"></canvas>

<script>
class OpenWorldEngine {
    constructor(canvasId) {
        this.canvas = document.getElementById(canvasId);
        this.ctx = this.canvas.getContext('2d');
        
        this.keys = { right: false, left: false, up: false };
        this.cameraX = 0;
        this.groundY = 500; 
        
        this.chunkSize = 1000; 
        this.worldMap = new Map(); 
        this.activeEntities = []; 
        
        this.player = { x: 320, y: 200, width: 24, height: 36, vx: 0, vy: 0, speed: 5, jump: -14, grounded: false };

        this.palettes = {
            HAPPY:   { bg: [135, 206, 235], ground: [144, 238, 144], platform: [255, 215, 0],  enemy: [255, 105, 180], player: [255, 255, 255] },
            NEUTRAL: { bg: [176, 196, 222], ground: [139, 69,  19],  platform: [34,  139, 34], enemy: [220, 20,  60],  player: [0,   0,   255] },
            SAD:     { bg: [47,  79,  79],  ground: [25,  25,  112], platform: [112, 128, 144],enemy: [75,  0,   130], player: [173, 216, 230] },
            ANGRY:   { bg: [40,  0,   0],   ground: [70,  0,   0],   platform: [139, 0,   0],  enemy: [255, 140, 0],   player: [255, 0,   0] }
        };

        this.currentTheme = this.palettes.HAPPY;
        
        // --- SMOOTHING VARIABLES ---
        this.targetStress = 0;   // Where the raw sensor data says we are (0.0 to 1.0)
        this.visualStress = 0;   // Where the screen colors actually are right now
        // Lower number = slower, smoother transitions. 0.01 at 60fps takes ~2 seconds to catch up
        this.smoothingFactor = 0.015; 

        this.setupInputs();
    }

    setTargetStress(rawPercentage) {
        // Convert 0-100 to 0.0-1.0
        this.targetStress = Math.max(0, Math.min(100, rawPercentage)) / 100;
    }

    // Called every frame to slowly drag the visual colors toward the raw data
    updateVisuals() {
        // Asymptotic Easing Math: current += (target - current) * speed
        this.visualStress += (this.targetStress - this.visualStress) * this.smoothingFactor;

        let stress = this.visualStress; 
        let t = 0;
        
        if (stress < 0.22) {
            t = stress / 0.22;
            this.currentTheme = this.blendPalettes(this.palettes.HAPPY, this.palettes.NEUTRAL, t);
        } else if (stress < 0.47) {
            t = (stress - 0.22) / 0.25; 
            this.currentTheme = this.blendPalettes(this.palettes.NEUTRAL, this.palettes.SAD, t);
        } else if (stress < 0.80) {
            t = (stress - 0.47) / 0.33; 
            this.currentTheme = this.blendPalettes(this.palettes.SAD, this.palettes.ANGRY, t);
        } else {
            this.currentTheme = this.blendPalettes(this.palettes.ANGRY, this.palettes.ANGRY, 1);
        }

        // Update UI labels for debugging
        document.getElementById('rawLabel').innerText = `Raw Sensor: ${Math.round(this.targetStress * 100)}%`;
        document.getElementById('visualLabel').innerText = `Screen Lerp: ${Math.round(this.visualStress * 100)}%`;
    }

    lerp(start, end, t) { return Math.round(start + (end - start) * t); }
    lerpRGB(c1, c2, t) { return `rgb(${this.lerp(c1[0], c2[0], t)}, ${this.lerp(c1[1], c2[1], t)}, ${this.lerp(c1[2], c2[2], t)})`; }

    blendPalettes(p1, p2, t) {
        return {
            bg: this.lerpRGB(p1.bg, p2.bg, t),
            ground: this.lerpRGB(p1.ground, p2.ground, t),
            platform: this.lerpRGB(p1.platform, p2.platform, t),
            enemy: this.lerpRGB(p1.enemy, p2.enemy, t),
            player: this.lerpRGB(p1.player, p2.player, t)
        };
    }

    setupInputs() {
        window.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowRight') this.keys.right = true;
            if (e.code === 'ArrowLeft') this.keys.left = true;
            if (e.code === 'ArrowUp') this.keys.up = true;
        });
        window.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowRight') this.keys.right = false;
            if (e.code === 'ArrowLeft') this.keys.left = false;
            if (e.code === 'ArrowUp') this.keys.up = false;
        });
    }

    generateChunk(chunkIndex) {
        let chunkData = [];
        let startX = chunkIndex * this.chunkSize;
        let endX = startX + this.chunkSize;
        let currentX = startX + Math.random() * 100;

        while (currentX < endX - 150) {
            let pWidth = Math.random() * 120 + 80;
            let pY = this.groundY - (Math.random() * 120 + 60); 
            
            chunkData.push({ type: 'platform', x: currentX, y: pY, width: pWidth, height: 20 });
            if (Math.random() < 0.3) chunkData.push({ type: 'enemy', x: currentX + pWidth/2 - 12, y: pY - 24, width: 24, height: 24 });
            
            currentX += pWidth + (Math.random() * 120 + 60); 
        }
        return chunkData;
    }

    updateChunks() {
        let playerChunkIndex = Math.floor(this.player.x / this.chunkSize);
        let chunksToLoad = [playerChunkIndex - 1, playerChunkIndex, playerChunkIndex + 1];
        this.activeEntities = [];

        for (let index of chunksToLoad) {
            if (!this.worldMap.has(index)) this.worldMap.set(index, this.generateChunk(index));
            this.activeEntities.push(...this.worldMap.get(index));
        }
    }

    updatePhysics() {
        if (this.keys.right) this.player.vx = this.player.speed;
        else if (this.keys.left) this.player.vx = -this.player.speed;
        else this.player.vx = 0;

        if (this.keys.up && this.player.grounded) {
            this.player.vy = this.player.jump;
            this.player.grounded = false;
        }

        this.player.vy += 0.6; 
        this.player.x += this.player.vx;
        this.player.y += this.player.vy;
        
        this.cameraX = this.player.x - (this.canvas.width / 2);

        this.player.grounded = false;

        if (this.player.y + this.player.height >= this.groundY) {
            this.player.y = this.groundY - this.player.height;
            this.player.vy = 0;
            this.player.grounded = true;
        }

        for (let entity of this.activeEntities) {
            if (entity.type === 'platform') {
                if (this.player.vy >= 0 && 
                    this.player.x + this.player.width > entity.x && 
                    this.player.x < entity.x + entity.width && 
                    this.player.y + this.player.height >= entity.y && 
                    this.player.y + this.player.height <= entity.y + this.player.vy + 2) {
                    
                    this.player.grounded = true;
                    this.player.vy = 0;
                    this.player.y = entity.y - this.player.height;
                }
            }
        }
    }

    draw() {
        this.ctx.fillStyle = this.currentTheme.bg;
        this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
        
        this.ctx.save();
        this.ctx.translate(-this.cameraX, 0);

        this.ctx.fillStyle = this.currentTheme.ground;
        this.ctx.fillRect(this.cameraX - 100, this.groundY, this.canvas.width + 200, this.canvas.height - this.groundY);

        for (let entity of this.activeEntities) {
            if (entity.type === 'platform') {
                this.ctx.fillStyle = this.currentTheme.platform;
                this.ctx.fillRect(entity.x, entity.y, entity.width, entity.height);
            } else if (entity.type === 'enemy') {
                this.ctx.fillStyle = this.currentTheme.enemy;
                this.ctx.fillRect(entity.x, entity.y, entity.width, entity.height);
            }
        }

        this.ctx.fillStyle = this.currentTheme.player;
        this.ctx.fillRect(this.player.x, this.player.y, this.player.width, this.player.height);

        this.ctx.restore();
    }

    loop() {
        this.updateChunks(); 
        this.updatePhysics();
        
        // Calculate new colors every frame
        this.updateVisuals(); 
        
        this.draw();
        requestAnimationFrame(() => this.loop());
    }

    start() {
        this.loop();
    }
}

// Initialize
const game = new OpenWorldEngine('gameCanvas');
game.start();

// ==========================================
// MOCK BIOMETRIC DATA STREAM (Simulates erratic API)
// ==========================================
let currentSimulatedStress = 10;

setInterval(() => {
    // 1. Natural drift (simulate standard breathing/slight changes)
    currentSimulatedStress += (Math.random() * 10 - 5); 
    
    // 2. Sudden massive spikes (simulate sensor noise or jump scares)
    if (Math.random() < 0.1) {
        currentSimulatedStress += (Math.random() * 80 - 40); 
    }

    // Keep it between 0 and 100
    currentSimulatedStress = Math.max(0, Math.min(100, currentSimulatedStress));
    
    // Feed the raw, noisy data to the game engine
    game.setTargetStress(currentSimulatedStress);

}, 300); // Receive new data every 300ms

</script>
</body>
</html>
